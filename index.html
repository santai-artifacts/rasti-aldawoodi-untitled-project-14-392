<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --green: #39ff87;
      --red: #ff4757;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --gold: #ffd700;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      user-select: none;
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--green);
      text-shadow: 0 0 20px #39ff8760, 0 0 40px #39ff8730;
      letter-spacing: 4px;
    }

    .stats {
      display: flex;
      gap: 48px;
    }

    .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .stat-value { font-family: 'Press Start 2P', monospace; font-size: 1.1rem; color: var(--green); }

    #canvas-wrap {
      position: relative;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px #39ff8715, inset 0 0 40px rgba(0,0,0,0.5);
    }

    canvas { display: block; }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(13,13,15,0.88);
      backdrop-filter: blur(4px);
    }

    .overlay-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--green);
      text-shadow: 0 0 20px #39ff8780;
    }

    .overlay-sub { font-size: 0.85rem; color: var(--muted); text-align: center; line-height: 1.8; }

    .btn {
      padding: 12px 32px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .hint { font-size: 0.75rem; color: var(--muted); }
    .key {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>

  <div class="stats">
    <div class="stat">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="score-display">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Best</span>
      <span class="stat-value" id="best-display">0</span>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div class="overlay-title">SNAKE</div>
      <div class="overlay-sub">Arrow keys or WASD to move<br/>Space or Enter to start</div>
      <button class="btn" onclick="startGame()">PLAY</button>
    </div>
  </div>

  <div class="hint">
    <span class="key">↑↓←→</span> / <span class="key">WASD</span> move &nbsp;·&nbsp; <span class="key">P</span> pause
  </div>

  <script>
    const COLS = 25, ROWS = 25, CELL = 22;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;

    const scoreEl = document.getElementById('score-display');
    const bestEl  = document.getElementById('best-display');
    const overlay = document.getElementById('overlay');

    let snake, dir, nextDir, food, score, gameLoop, paused, running;
    let best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function rnd(n) { return Math.floor(Math.random() * n); }

    function spawnFood() {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      let pos;
      do { pos = { x: rnd(COLS), y: rnd(ROWS) }; }
      while (occupied.has(`${pos.x},${pos.y}`));
      return pos;
    }

    function startGame() {
      overlay.style.display = 'none';
      const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
      snake   = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score   = 0;
      paused  = false;
      running = true;
      scoreEl.textContent = '0';
      food = spawnFood();
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, 100);
      draw();
    }

    function tick() {
      if (paused || !running) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      if (snake.some(s => s.x === head.x && s.y === head.y))              return gameOver();

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        food = spawnFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0d0d0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1a1a22';
      for (let x = 0; x < COLS; x++)
        for (let y = 0; y < ROWS; y++)
          ctx.fillRect(x * CELL + CELL / 2 - 1, y * CELL + CELL / 2 - 1, 2, 2);

      // Food
      ctx.save();
      ctx.shadowColor = '#ff4757';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#ff4757';
      ctx.beginPath();
      ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        const pad = i === 0 ? 1 : 2;

        ctx.save();
        if (i === 0) { ctx.shadowColor = '#39ff87'; ctx.shadowBlur = 16; }
        ctx.fillStyle = i === 0
          ? '#39ff87'
          : `rgba(${Math.floor(57 + t * 20)}, ${Math.floor(255 - t * 80)}, ${Math.floor(135 - t * 60)}, ${1 - t * 0.5})`;

        roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, i === 0 ? 5 : 4);
        ctx.fill();
        ctx.restore();

        if (i === 0) {
          const perp = { x: -dir.y, y: dir.x };
          const cx = seg.x * CELL + CELL / 2 + dir.x * 5;
          const cy = seg.y * CELL + CELL / 2 + dir.y * 5;
          ctx.fillStyle = '#0d0d0f';
          ctx.beginPath(); ctx.arc(cx + perp.x * 3, cy + perp.y * 3, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(cx - perp.x * 3, cy - perp.y * 3, 2, 0, Math.PI * 2); ctx.fill();
        }
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function gameOver() {
      running = false;
      clearInterval(gameLoop);
      ctx.fillStyle = 'rgba(255,71,87,0.12)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      overlay.innerHTML = `
        <div class="overlay-title" style="color:var(--red)">GAME OVER</div>
        <div class="overlay-sub">Score: <strong style="color:var(--green);font-size:1.1em">${score}</strong></div>
        <button class="btn" onclick="startGame()">PLAY AGAIN</button>
      `;
      overlay.style.display = '';
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp:{x:0,y:-1}, w:{x:0,y:-1}, W:{x:0,y:-1},
        ArrowDown:{x:0,y:1}, s:{x:0,y:1}, S:{x:0,y:1},
        ArrowLeft:{x:-1,y:0}, a:{x:-1,y:0}, A:{x:-1,y:0},
        ArrowRight:{x:1,y:0}, d:{x:1,y:0}, D:{x:1,y:0},
      };
      if (map[e.key]) {
        const nd = map[e.key];
        if (running && (nd.x !== -dir.x || nd.y !== -dir.y)) nextDir = nd;
        e.preventDefault();
      }
      if ((e.key === ' ' || e.key === 'Enter') && !running) startGame();
      if ((e.key === 'p' || e.key === 'P') && running) paused = !paused;
    });

    // Touch / swipe
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });
    canvas.addEventListener('touchend', e => {
      if (!touchStart || !running) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
      const nd = Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? {x:1,y:0} : {x:-1,y:0})
        : (dy > 0 ? {x:0,y:1} : {x:0,y:-1});
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
      touchStart = null;
    }, { passive: true });

    // Initial blank board
    ctx.fillStyle = '#0d0d0f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  </script>
</body>
</html>
