<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --green: #39ff87;
      --green-dim: #1a7a40;
      --red: #ff4757;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --gold: #ffd700;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 20px;
      user-select: none;
    }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--green);
      text-shadow: 0 0 20px #39ff8760, 0 0 40px #39ff8730;
      margin-bottom: 24px;
      letter-spacing: 4px;
    }

    .layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .stats {
      display: flex;
      gap: 32px;
      width: 100%;
      justify-content: space-between;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .stat-value {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.1rem;
      color: var(--green);
    }

    #canvas-wrap {
      position: relative;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px #39ff8715, inset 0 0 40px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(13,13,15,0.88);
      backdrop-filter: blur(4px);
    }

    .overlay-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--green);
      text-shadow: 0 0 20px #39ff8780;
    }

    .overlay-sub {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    #score-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 220px;
    }

    #score-form input {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #score-form input:focus { border-color: var(--green); }

    .btn {
      padding: 10px 28px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.secondary {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .btn.secondary:hover { border-color: var(--text); color: var(--text); }

    .btn-row { display: flex; gap: 10px; }

    /* Leaderboard */
    .side-panel {
      width: 220px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .side-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: var(--green);
      letter-spacing: 2px;
    }

    #leaderboard { padding: 8px 0; min-height: 120px; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      transition: background 0.15s;
    }

    .score-row:hover { background: rgba(255,255,255,0.03); }

    .rank {
      font-size: 0.7rem;
      color: var(--muted);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .rank.gold { color: var(--gold); }
    .rank.silver { color: #c0c0c0; }
    .rank.bronze { color: #cd7f32; }

    .score-name {
      flex: 1;
      font-size: 0.85rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-pts {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: var(--green);
    }

    .no-scores { color: var(--muted); font-size: 0.8rem; padding: 20px 16px; text-align: center; }

    /* Controls hint */
    .hint {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .key {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.7rem;
    }

    /* Mobile swipe area */
    @media (max-width: 600px) {
      .side-panel { width: 100%; max-width: 340px; }
      .layout { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>

  <div class="layout">
    <div class="game-panel">
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score-display">0</span>
        </div>
        <div class="stat" style="text-align:right">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="best-display">0</span>
        </div>
      </div>

      <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
        <div id="overlay">
          <div class="overlay-title">SNAKE</div>
          <div class="overlay-sub">Arrow keys or WASD to move<br/>Space / Enter to start</div>
          <button class="btn" id="start-btn" onclick="startGame()">PLAY</button>
        </div>
      </div>

      <div class="hint">
        <span><span class="key">↑↓←→</span> or <span class="key">WASD</span> — move</span>
        <span><span class="key">P</span> — pause</span>
      </div>
    </div>

    <div class="side-panel">
      <div class="side-header">LEADERBOARD</div>
      <div id="leaderboard"><div class="no-scores">Loading…</div></div>
    </div>
  </div>

  <script>
    const COLS = 25, ROWS = 25, CELL = 22;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;

    let snake, dir, nextDir, food, score, best, gameLoop, paused, running;
    let touchStart = null;

    const scoreEl = document.getElementById('score-display');
    const bestEl = document.getElementById('best-display');
    const overlay = document.getElementById('overlay');

    best = parseInt(localStorage.getItem('snakeBest') || '0');
    bestEl.textContent = best;

    function rnd(n) { return Math.floor(Math.random() * n); }

    function spawnFood() {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      let pos;
      do { pos = { x: rnd(COLS), y: rnd(ROWS) }; }
      while (occupied.has(`${pos.x},${pos.y}`));
      return pos;
    }

    function initGame() {
      const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
      snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = '0';
      food = spawnFood();
      paused = false;
      running = true;
    }

    function startGame() {
      overlay.style.display = 'none';
      initGame();
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, 100);
      draw();
    }

    function tick() {
      if (paused || !running) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return gameOver();
      }
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem('snakeBest', best);
        }
        food = spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      // Background
      ctx.fillStyle = '#0d0d0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid dots
      ctx.fillStyle = '#1a1a22';
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          ctx.fillRect(x * CELL + CELL / 2 - 1, y * CELL + CELL / 2 - 1, 2, 2);
        }
      }

      // Food
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.save();
      ctx.shadowColor = '#ff4757';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#ff4757';
      ctx.beginPath();
      ctx.arc(fx, fy, CELL / 2 - 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        const alpha = 1 - t * 0.5;
        const x = seg.x * CELL;
        const y = seg.y * CELL;
        const pad = i === 0 ? 1 : 2;
        const r = i === 0 ? 5 : 4;

        ctx.save();
        if (i === 0) {
          ctx.shadowColor = '#39ff87';
          ctx.shadowBlur = 16;
        }
        ctx.fillStyle = i === 0
          ? '#39ff87'
          : `rgba(${Math.floor(57 + t * 20)}, ${Math.floor(255 - t * 80)}, ${Math.floor(135 - t * 60)}, ${alpha})`;

        roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, r);
        ctx.fill();
        ctx.restore();

        // Eyes on head
        if (i === 0) {
          ctx.fillStyle = '#0d0d0f';
          const ex1 = x + CELL / 2 + dir.y * 4 - dir.x * 3;
          const ey1 = y + CELL / 2 - dir.x * 4 - dir.y * 3 + dir.y * 6;
          const ex2 = x + CELL / 2 + dir.y * 4 + dir.x * 3;
          const ey2 = y + CELL / 2 + dir.x * 4 - dir.y * 3 + dir.y * 6;

          const eyeOffX = dir.x * 5;
          const eyeOffY = dir.y * 5;
          const perp = { x: -dir.y, y: dir.x };

          ctx.beginPath();
          ctx.arc(x + CELL/2 + eyeOffX + perp.x * 3, y + CELL/2 + eyeOffY + perp.y * 3, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(x + CELL/2 + eyeOffX - perp.x * 3, y + CELL/2 + eyeOffY - perp.y * 3, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function gameOver() {
      running = false;
      clearInterval(gameLoop);

      // Flash red
      ctx.fillStyle = 'rgba(255, 71, 87, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      overlay.innerHTML = `
        <div class="overlay-title" style="color:var(--red)">GAME OVER</div>
        <div class="overlay-sub">Score: <strong style="color:var(--green)">${score}</strong></div>
        ${score > 0 ? `
        <form id="score-form" onsubmit="submitScore(event)">
          <input id="player-name" type="text" placeholder="Your name" maxlength="20" autocomplete="off" />
          <div class="btn-row">
            <button type="submit" class="btn">SUBMIT</button>
            <button type="button" class="btn secondary" onclick="startGame()">SKIP</button>
          </div>
        </form>` : ''}
        <button class="btn" style="margin-top:4px" onclick="startGame()">PLAY AGAIN</button>
      `;
      overlay.style.display = '';
      if (score > 0) setTimeout(() => document.getElementById('player-name')?.focus(), 50);
    }

    async function submitScore(e) {
      e.preventDefault();
      const name = document.getElementById('player-name').value.trim();
      if (!name) return;

      const btn = e.target.querySelector('[type=submit]');
      btn.textContent = '…';
      btn.disabled = true;

      try {
        const res = await fetch('/api/scores', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, score }),
        });
        const { rank } = await res.json();
        overlay.innerHTML = `
          <div class="overlay-title" style="color:var(--gold)">SAVED!</div>
          <div class="overlay-sub">You ranked <strong style="color:var(--green)">#${rank}</strong> with ${score} pts</div>
          <button class="btn" onclick="startGame()">PLAY AGAIN</button>
        `;
        loadLeaderboard();
      } catch {
        btn.textContent = 'SUBMIT';
        btn.disabled = false;
      }
    }

    async function loadLeaderboard() {
      const el = document.getElementById('leaderboard');
      try {
        const data = await fetch('/api/scores').then(r => r.json());
        if (!data.length) {
          el.innerHTML = '<div class="no-scores">No scores yet.<br/>Be the first!</div>';
          return;
        }
        const medals = ['gold', 'silver', 'bronze'];
        el.innerHTML = data.map((s, i) => `
          <div class="score-row">
            <span class="rank ${medals[i] || ''}">${i + 1}</span>
            <span class="score-name">${escHtml(s.name)}</span>
            <span class="score-pts">${s.score}</span>
          </div>
        `).join('');
      } catch {
        el.innerHTML = '<div class="no-scores">Could not load scores.</div>';
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Input
    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
      };
      if (map[e.key]) {
        const nd = map[e.key];
        if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
        e.preventDefault();
      }
      if (e.key === ' ' || e.key === 'Enter') {
        if (!running) startGame();
        e.preventDefault();
      }
      if ((e.key === 'p' || e.key === 'P') && running) {
        paused = !paused;
      }
    });

    // Touch / swipe
    canvas.addEventListener('touchstart', e => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });

    canvas.addEventListener('touchend', e => {
      if (!touchStart || !running) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
      let nd;
      if (Math.abs(dx) > Math.abs(dy)) {
        nd = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
      } else {
        nd = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
      }
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
      touchStart = null;
    }, { passive: true });

    // Initial draw (empty board)
    ctx.fillStyle = '#0d0d0f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    loadLeaderboard();
  </script>
</body>
</html>
